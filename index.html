<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#EE5524" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <!-- Fontes carregam de forma não-bloqueante: o browser baixa em paralelo e aplica quando pronto.
         Sem isso, um CSS externo do Google Fonts trava o render inteiro em redes lentas. -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=Instrument+Sans:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <meta
      name="description"
      content="Granativa - Organize suas finanças pessoais e do casal sem misturar o que é individual com o que é compartilhado."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Granativa" />
    <meta
      property="og:description"
      content="Controle individual. Organização a dois."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://granativa.com.br/brand/granativa-logo-horizontal.png" />
    <link rel="canonical" href="https://granativa.com.br/" />
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/brand/granativa-app-icon-180.png" />
    <title>Granativa</title>
    <script>
      (() => {
        const validThemes = ['paper', 'sakura', 'obsidian', 'midnight', 'aurora', 'rose-gold'];
        const validModes = ['manual', 'system'];
        const mode = validModes.includes(localStorage.getItem('zerou.themeMode'))
          ? localStorage.getItem('zerou.themeMode')
          : 'manual';
        const manualTheme = validThemes.includes(localStorage.getItem('zerou.themeId'))
          ? localStorage.getItem('zerou.themeId')
          : 'paper';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolvedTheme = mode === 'system' ? (prefersDark ? 'obsidian' : 'paper') : manualTheme;

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
