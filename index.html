<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5B5BD6" />
    <meta
      name="description"
      content="Zerou - Controle individual. Organizacao a dois."
    />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/brand/zerou-app-icon-180.png" />
    <title>Zerou</title>
    <script>
      (() => {
        const validThemes = ['paper', 'sakura', 'obsidian', 'midnight', 'aurora', 'rose-gold'];
        const validModes = ['manual', 'system'];
        const mode = validModes.includes(localStorage.getItem('zerou.themeMode'))
          ? localStorage.getItem('zerou.themeMode')
          : 'system';
        const manualTheme = validThemes.includes(localStorage.getItem('zerou.themeId'))
          ? localStorage.getItem('zerou.themeId')
          : 'paper';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolvedTheme = mode === 'system' ? (prefersDark ? 'obsidian' : 'paper') : manualTheme;

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
